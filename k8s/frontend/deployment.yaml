apiVersion: apps/v1
kind: Deployment
metadata:
  name: novasre-frontend
  namespace: novasre
  labels:
    app: novasre-frontend
    app.kubernetes.io/name: novasre-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: novasre
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: novasre-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: novasre-frontend
        app.kubernetes.io/name: novasre-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101    # nginx user
        fsGroup: 101
      terminationGracePeriodSeconds: 15

      containers:
        - name: frontend
          image: novasre/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]

          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: novasre-frontend
                topologyKey: kubernetes.io/hostname
