apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novasre-ingress
  namespace: novasre
  labels:
    app.kubernetes.io/name: novasre-ingress
    app.kubernetes.io/part-of: novasre
  annotations:
    # Nginx ingress controller annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"

    # SSL — cert-manager will provision a Let's Encrypt certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Proxy settings for FastAPI + WebSocket
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # CORS — handled in FastAPI; disable at ingress level to avoid double headers
    nginx.ingress.kubernetes.io/enable-cors: "false"

    # Rate limiting — protect the AI endpoints from abuse
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # Gzip compression for API responses
    nginx.ingress.kubernetes.io/server-snippet: |
      gzip on;
      gzip_types application/json text/plain;
      gzip_min_length 1000;

spec:
  tls:
    - hosts:
        - novasre.your-org.com
      secretName: novasre-tls

  rules:
    - host: novasre.your-org.com
      http:
        paths:
          # --- Backend API ---
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: novasre-backend
                port:
                  number: 80

          # --- WebSocket endpoint ---
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: novasre-backend
                port:
                  number: 80

          # --- Health checks (bypass rate limiting) ---
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: novasre-backend
                port:
                  number: 80

          # --- Frontend (catch-all — must be last) ---
          - path: /
            pathType: Prefix
            backend:
              service:
                name: novasre-frontend
                port:
                  number: 80
