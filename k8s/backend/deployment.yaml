apiVersion: apps/v1
kind: Deployment
metadata:
  name: novasre-backend
  namespace: novasre
  labels:
    app: novasre-backend
    app.kubernetes.io/name: novasre-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: novasre
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: novasre-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: novasre-backend
        app.kubernetes.io/name: novasre-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: novasre-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          image: novasre/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          command:
            - uvicorn
            - main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "4"
            - --loop
            - uvloop
            - --http
            - httptools

          # Load all settings from ConfigMap + Secrets
          envFrom:
            - configMapRef:
                name: novasre-backend-config
            - secretRef:
                name: novasre-backend-secrets

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          # Liveness probe — if this fails, Kubernetes restarts the pod
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Readiness probe — if this fails, pod is removed from Service endpoints
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup probe — gives extra time on first boot (LLM model loading)
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12   # 60s total startup window

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: novasre-backend
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: novasre-backend
