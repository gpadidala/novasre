name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deploys

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/novasre

jobs:
  # =========================================================================
  # Build and push Docker images
  # =========================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP server
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/mcp-server:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Deploy to Staging
  # =========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://novasre-staging.your-org.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Substitute image tags
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          sed -i "s|novasre/backend:latest|${{ env.IMAGE_PREFIX }}/backend:${IMAGE_TAG}|g" k8s/backend/deployment.yaml
          sed -i "s|novasre/frontend:latest|${{ env.IMAGE_PREFIX }}/frontend:${IMAGE_TAG}|g" k8s/frontend/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/novasre-backend -n novasre --timeout=5m
          kubectl rollout status deployment/novasre-frontend -n novasre --timeout=5m

      - name: Run post-deploy smoke tests
        run: |
          # Wait for ingress to be ready
          sleep 15
          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://novasre-staging.your-org.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Smoke test passed — HTTP $STATUS"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":red_circle: NovaSRE staging deploy FAILED for <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

  # =========================================================================
  # Deploy to Production (requires manual approval)
  # =========================================================================
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://novasre.your-org.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Substitute image tags
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          sed -i "s|novasre/backend:latest|${{ env.IMAGE_PREFIX }}/backend:${IMAGE_TAG}|g" k8s/backend/deployment.yaml
          sed -i "s|novasre/frontend:latest|${{ env.IMAGE_PREFIX }}/frontend:${IMAGE_TAG}|g" k8s/frontend/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout (production)
        run: |
          kubectl rollout status deployment/novasre-backend -n novasre --timeout=10m
          kubectl rollout status deployment/novasre-frontend -n novasre --timeout=5m

      - name: Production health check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://novasre.your-org.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed — rolling back"
            kubectl rollout undo deployment/novasre-backend -n novasre
            kubectl rollout undo deployment/novasre-frontend -n novasre
            exit 1
          fi
          echo "Production deploy successful — HTTP $STATUS"

      - name: Create GitHub deployment annotation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id,
              state: 'success',
              environment_url: 'https://novasre.your-org.com',
              description: 'Deploy successful',
            });

      - name: Notify on success
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rocket: NovaSRE production deploy SUCCEEDED for <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":fire: NovaSRE PRODUCTION deploy FAILED — rollback initiated. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
