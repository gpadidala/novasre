# Alembic configuration file — NovaSRE

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Maximum length of the "slug" component of revision file names
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# even when autogenerate is used.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a .py source.
sourceless = false

# Output encoding used when revision files are written from script.mako
output_encoding = utf-8

# Database URL — overridden by env.py from app settings
sqlalchemy.url = postgresql+asyncpg://novasre:secret@localhost:5432/novasre


[post_write_hooks]
# Post-write hooks to run after generating a revision file.
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
